# Railway Configuration for Story Map SPA
# PostgreSQL (Neon) + Node.js + Express

[build]
builder = "NIXPACKS"
buildCommand = "cd backend && npm install && cd .. && npm install && npm run build"

[deploy]
startCommand = "cd backend && npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Health check endpoint
[[healthchecks]]
path = "/health"
timeout = 100
interval = 60

# Note: Environment variables harus diset di Railway Dashboard → Variables
# Required variables:
# - DATABASE_URL (dari Neon)
# - JWT_SECRET (random string)
# - JWT_EXPIRES_IN (default: 7d)
# - PORT (default: 3001)
# - NODE_ENV (production)
